<script>
fetch("/me")
  .then(res => res.json())
  .then(user => {
    document.getElementById("userInfo").innerHTML =
      "<b>" + user.name + "</b><br>Role: " + user.role;
  });
</script>

<script>
AFRAME.registerComponent("lobby-limit", {
  tick: function () {
    const p = this.el.object3D.position;

    if (p.x < -7.5) p.x = -7.5;
    if (p.x >  7.5) p.x =  7.5;
    if (p.z < -7.5) p.z = -7.5;
    if (p.z >  7.5) p.z =  7.5;

    p.y = 1.6;
  }
});
</script>

<script>
let activeDoorUrl = null;

function enterActiveDoor() {
  if (activeDoorUrl) {
    window.location.href = activeDoorUrl;
  }
}

AFRAME.registerComponent("door-link", {
  schema: {
    url: { type: "string" }
  },

  init: function () {
    const cursor = document.getElementById("centerCursor");
    const hint = document.getElementById("interactionHint");

    this.el.addEventListener("mouseenter", () => {
      activeDoorUrl = this.data.url;

      if (cursor) {
        cursor.setAttribute("color", "#22c55e");
        cursor.setAttribute("scale", "1.5 1.5 1.5");
      }

      if (hint) {
        hint.style.display = "block";
      }
    });

    this.el.addEventListener("mouseleave", () => {
      activeDoorUrl = null;

      if (cursor) {
        cursor.setAttribute("color", "#ffffff");
        cursor.setAttribute("scale", "1 1 1");
      }

      if (hint) {
        hint.style.display = "none";
      }
    });
  }
});

document.addEventListener("keydown", e => {
  if (e.key === "e" || e.key === "E") {
    enterActiveDoor();
  }
});

document.addEventListener("mousedown", e => {
  if (activeDoorUrl) {
    e.preventDefault();
    enterActiveDoor();
  }
});
</script>

<script>
window.socket = io();
window.roomName = "lobby";

window.socket.on("connect", () => {
  console.log("Connected:", window.socket.id);
});
</script>
<script>
window.socket.on("onlineUsersUpdate", users => {
  const list = document.getElementById("onlineUsersList");

  const title = document.getElementById("onlineUsersTitle");
  
  if (title) {
    title.innerHTML = `Online Users (${users.length})`;
  }
  
  
  
  if (!list) return;

  if (!users || users.length === 0) {
    list.innerHTML = "No users online";
    return;
  }

  list.innerHTML = users.map(user => {
    return `
      <div style="margin-bottom:6px;">
        <span style="color:${user.color}; font-weight:bold;">●</span>
        ${user.name}
        <br>
        <span style="color:#cbd5e1; font-size:12px;">
          ${user.role} / ${user.room}
        </span>
      </div>
    `;
  }).join("");
});
</script>
