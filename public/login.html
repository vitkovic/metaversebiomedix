<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Metaverse Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .login-box {
      width: 340px;
      margin: 120px auto;
      padding: 30px;
      background: #1e293b;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    label {
      font-size: 14px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 16px;
      border: none;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .info {
      margin-top: 18px;
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.5;
    }

    .error {
      color: #f87171;
      text-align: center;
      margin-bottom: 15px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Metaverse Login</h2>

    <div id="errorBox" class="error">
      Wrong username or password
    </div>

    <form method="post" action="/login">
      <label>Username</label>
      <input type="text" name="username" required>

      <label>Password</label>
      <input type="password" name="password" required>

      <button type="submit">Login</button>
    </form>

    <div class="info">
      Test users:<br>
      nikola / 1234<br>
      teacher / 1234<br>
      student / 1234<br>
      guest / 1234
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    if (params.get("error") === "1") {
      document.getElementById("errorBox").style.display = "block";
    }
  </script>

</body>
</html>
