<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Whiteboard Room</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <link rel="stylesheet" href="/css/chat.css">

  <style>
    #customCrosshair {
      position: fixed;
      width: 18px;
      height: 18px;
      z-index: 9000;
      pointer-events: none;
      display: none;
    }

    #customCrosshair::before,
    #customCrosshair::after {
      content: "";
      position: absolute;
      background: black;
    }

    #customCrosshair::before {
      left: 8px;
      top: 0;
      width: 2px;
      height: 18px;
    }

    #customCrosshair::after {
      left: 0;
      top: 8px;
      width: 18px;
      height: 2px;
    }

    #topBar {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.7);
      padding: 8px;
    }

    #tools {
      position: fixed;
      top: 60px;
      left: 10px;
      z-index: 9999;
      background: rgba(255,255,255,0.9);
      padding: 8px;
      font-family: Arial, sans-serif;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #board {
      display: none;
    }
  </style>
</head>

<body>

<div id="topBar">
  <button onclick="window.location.href='/index.html'">Back to Lobby</button>
  <span id="userInfo">Loading...</span>
</div>

<div id="tools">
  <label>Color:</label>
  <input id="penColor" type="color" value="#000000">

  <label>Size:</label>
  <input id="penSize" type="range" min="1" max="16" value="4">

  <button id="textModeBtn">Text</button>
  <button id="imageBtn">Image</button>

  <input
    type="file"
    id="imageFile"
    accept="image/*"
    style="display:none;">
  <button id="clearBoard">Clear</button>
</div>

<canvas id="board" width="1024" height="512"></canvas>
<div id="customCrosshair"></div>





<a-scene background="color:#111827"  vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

  <a-entity id="player"
            position="0 1.6 4"
            wasd-controls="acceleration:20"
            look-controls>
    <a-entity camera position="0 0 0"></a-entity>
  </a-entity>

  <a-plane position="0 0 0"
           rotation="-90 0 0"
           width="16"
           height="16"
           color="#374151">
  </a-plane>

  <a-box position="0 3 -8" width="16" height="6" depth="0.2" color="#4b5563"></a-box>
  <a-box position="0 3 8" width="16" height="6" depth="0.2" color="#4b5563"></a-box>
  <a-box position="-8 3 0" width="0.2" height="6" depth="16" color="#4b5563"></a-box>
  <a-box position="8 3 0" width="0.2" height="6" depth="16" color="#4b5563"></a-box>

  <a-plane position="0 6 0"
           rotation="90 0 0"
           width="16"
           height="16"
           color="#1f2937">
  </a-plane>

  <a-text value="WHITEBOARD ROOM"
          align="center"
          position="0 5.3 -7.7"
          width="8"
          color="white">
  </a-text>

  <a-plane id="whiteboard3d"
           position="0 3 -7.86"
           width="7.5"
           height="3.75"
           material="src:#board; shader:flat; side:double">
  </a-plane>

  <a-box position="0 5 -7.9" width="7.8" height="0.08" depth="0.08" color="#111827"></a-box>
  <a-box position="0 1 -7.9" width="7.8" height="0.08" depth="0.08" color="#111827"></a-box>
  <a-box position="-3.9 3 -7.9" width="0.08" height="4" depth="0.08" color="#111827"></a-box>
  <a-box position="3.9 3 -7.9" width="0.08" height="4" depth="0.08" color="#111827"></a-box>

  <a-text value="Draw and write directly on the wall board"
          align="center"
          position="0 0.65 -7.7"
          width="6"
          color="white">
  </a-text>

  <a-light type="ambient" intensity="0.8"></a-light>
  <a-light type="point" position="0 4 0" intensity="1.2"></a-light>

</a-scene>

<script>
window.socket = io();
window.roomName = "whiteboard";

fetch("/me")
  .then(res => res.json())
  .then(user => {
    document.getElementById("userInfo").innerHTML =
      " " + user.name + " / " + user.role;
  });
</script>

<script src="/js/avatars.js"></script>
<script src="/js/whiteboard.js"></script>
<script src="/js/chat.js"></script>

</body>
</html>
